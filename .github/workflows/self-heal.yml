name: Self-Heal
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Validate
        run: |
          pip install pyyaml -q
          [ -f requirements.txt ] && pip install -r requirements.txt -q || true
          python3 << 'PYEOF'
          import os, yaml
          for fn in os.listdir('.github/workflows'):
              if fn.endswith(('.yml', '.yaml')):
                  try:
                      yaml.safe_load(open(f'.github/workflows/{fn}'))
                      print(f'OK {fn}')
                  except yaml.YAMLError as e:
                      print(f'ERR {fn}: {e}')
          PYEOF
        continue-on-error: true
      - run: echo "Self-heal $(date -u)"
